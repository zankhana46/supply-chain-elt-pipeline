name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install dbt-core dbt-duckdb duckdb pandas pyarrow requests

      - name: Create seed data
        run: python tests/create_seed_data.py

      - name: Run dbt
        run: |
          cd dbt_project/supply_chain
          dbt run --profiles-dir .
          dbt test --profiles-dir .