# Docker Compose spins up Airflow with all its components.
# In production, this would be managed by Kubernetes or a cloud service
# like AWS MWAA or Astronomer. Same concepts, bigger scale.

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0-python3.12
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Tell dbt where to find profiles.yml inside the container
    DBT_PROFILES_DIR: /opt/airflow/dbt_project/supply_chain
  volumes:
    # Mount our local folders into the container
    - ../dags:/opt/airflow/dags
    - ../extract:/opt/airflow/extract
    - ../load:/opt/airflow/load
    - ../data:/opt/airflow/data
    - ../dbt_project:/opt/airflow/dbt_project
    - ../requirements.txt:/opt/airflow/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -r /opt/airflow/requirements.txt &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "pip install -r /opt/airflow/requirements.txt && airflow webserver"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "pip install -r /opt/airflow/requirements.txt && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data: